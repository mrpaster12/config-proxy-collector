name: Telegram Scraper Automation

on:
  schedule:
    - cron: '0 */12 * * *'  # Runs every 12 hours
  workflow_dispatch:      # Allows manual trigger

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Python Scraper
        run: python scraper.py

      - name: Commit and Push Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add configs.json proxies.json sub.txt sub_raw.txt
          
          # Check if there are changes before attempting to commit
          if git diff --staged --quiet; then
            echo "No updates detected. Skipping commit."
          else
            git commit -m "Auto-update VPN configs and Telegram proxies"
            git push origin main
          fi
